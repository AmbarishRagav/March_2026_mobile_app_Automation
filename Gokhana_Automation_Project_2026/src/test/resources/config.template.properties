# TEMPLATE FILE ? Copy this to config.properties and fill in your values
# DO NOT add real credentials to this file
# ?????????????????????????????????????????????????????????

# Switch between 'emulator' or 'physical'
targetDevice=emulator

# Physical Device
physical.deviceName=YOUR_DEVICE_NAME
physical.udid=YOUR_DEVICE_UDID
physical.platformVersion=YOUR_ANDROID_VERSION

# Emulator
emulator.deviceName=sdk_gphone64_x86_64
emulator.udid=emulator-5554
emulator.platformVersion=16

# App Config
appPackage=com.gokhana.customer
appActivity=com.gokhana.customer.MainActivity
appiumURL=http://127.0.0.1:4723/
appiumJSPath=C:\\Users\\YOUR_USERNAME\\AppData\\Roaming\\npm\\node_modules\\appium\\build\\lib\\main.js
apkPath=APP_Resource/YOUR_APK_FILE.apk

# Test Data ? fill in before running
mobileNumber=YOUR_MOBILE_NUMBER
otp=YOUR_OTP
foodCourtName=YOUR_FOODCOURT_NAME
